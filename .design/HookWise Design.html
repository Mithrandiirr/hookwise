<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1200" />
<title>HookWise — Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hookwise.css" />
<style>
  html, body { margin: 0; padding: 0; background: #06080d; }
  body { font-family: "Geist", ui-sans-serif, system-ui, sans-serif; }
  /* Let artboards themselves render full-bleed without extra chrome */
  .hw-artboard-host { background: #06080d; }

  /* Tweaks panel */
  .hw-tweaks {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    width: 280px; background: #0a0d14;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px 16px;
    font-family: "Geist", system-ui, sans-serif;
    color: #e7ecf2;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .hw-tweaks-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(231,236,242,0.45);
    font-family: "Geist Mono", monospace;
    margin-bottom: 12px;
  }
  .hw-tweaks label {
    display: block; font-size: 12px; color: rgba(231,236,242,0.65);
    margin: 10px 0 4px;
  }
  .hw-tweaks .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .hw-tweaks button {
    font-family: inherit; font-size: 11.5px;
    padding: 5px 9px; border-radius: 6px;
    background: transparent; color: rgba(231,236,242,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; transition: all 120ms;
  }
  .hw-tweaks button.on {
    background: rgba(129,140,248,0.12);
    color: #a5b4fc; border-color: rgba(129,140,248,0.35);
  }
  .hw-tweaks button:hover { border-color: rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="hookwise-shared.jsx"></script>
  <script type="text/babel" src="hookwise-landing.jsx"></script>
  <script type="text/babel" src="hookwise-dashboard.jsx"></script>
  <script type="text/babel" src="hookwise-events.jsx"></script>
  <script type="text/babel" src="hookwise-anomaly.jsx"></script>

  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "accent": "indigo",
      "grain": true,
      "liveMotion": true
    }/*EDITMODE-END*/;

    const accentMap = {
      indigo: { ink: "#a5b4fc", base: "#818cf8", deep: "#6366f1" },
      emerald:{ ink: "#86efac", base: "#4ade80", deep: "#22c55e" },
      amber:  { ink: "#fcd34d", base: "#fbbf24", deep: "#f59e0b" },
      cyan:   { ink: "#67e8f9", base: "#22d3ee", deep: "#06b6d4" },
    };

    function applyAccent(a) {
      const c = accentMap[a] || accentMap.indigo;
      const root = document.documentElement;
      root.style.setProperty("--hw-indigo", c.base);
      root.style.setProperty("--hw-indigo-2", c.deep);
      root.style.setProperty("--hw-indigo-ink", c.ink);
    }

    function App() {
      const [accent, setAccent] = React.useState(TWEAKS.accent);
      const [editMode, setEditMode] = React.useState(false);

      React.useEffect(() => { applyAccent(accent); }, [accent]);

      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e?.data?.type) return;
          if (e.data.type === "__activate_edit_mode") setEditMode(true);
          if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const persist = (edits) => {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
      };

      return (
        <>
          <DesignCanvas initialScale={0.8}>
            <DCSection id="landing" title="01 · Landing">
              <DCArtboard id="landing-main" label="Landing Page · 1440 × 2800" width={1440} height={2800}>
                <div className="hw-artboard-host" style={{ width: "100%", height: "100%", overflow: "hidden" }}>
                  <LandingPage />
                </div>
              </DCArtboard>
            </DCSection>

            <DCSection id="dash" title="02 · Dashboard Overview">
              <DCArtboard id="dash-main" label="Dashboard · 1440 × 1024" width={1440} height={1024}>
                <div className="hw-artboard-host" style={{ width: "100%", height: "100%", overflow: "hidden" }}>
                  <DashOverview />
                </div>
              </DCArtboard>
            </DCSection>

            <DCSection id="events" title="03 · Events Stream (live log)">
              <DCArtboard id="events-main" label="Events · 1440 × 1024" width={1440} height={1024}>
                <div className="hw-artboard-host" style={{ width: "100%", height: "100%", overflow: "hidden" }}>
                  <EventsStream />
                </div>
              </DCArtboard>
            </DCSection>

            <DCSection id="anomaly" title="04 · AI Investigation">
              <DCArtboard id="anomaly-main" label="Anomaly detail · 1440 × 1280" width={1440} height={1280}>
                <div className="hw-artboard-host" style={{ width: "100%", height: "100%", overflow: "hidden" }}>
                  <AnomalyDetail />
                </div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          {editMode && (
            <div className="hw-tweaks">
              <div className="hw-tweaks-title">Tweaks</div>
              <label>Accent color</label>
              <div className="row">
                {Object.keys(accentMap).map(k => (
                  <button key={k} className={accent === k ? "on" : ""} onClick={() => { setAccent(k); persist({ accent: k }); }}>
                    {k}
                  </button>
                ))}
              </div>
              <label style={{ marginTop: 14 }}>Open artboard</label>
              <div className="row">
                <button onClick={() => document.getElementById("landing")?.scrollIntoView()}>Landing</button>
                <button onClick={() => document.getElementById("dash")?.scrollIntoView()}>Dash</button>
                <button onClick={() => document.getElementById("events")?.scrollIntoView()}>Events</button>
                <button onClick={() => document.getElementById("anomaly")?.scrollIntoView()}>Anomaly</button>
              </div>
              <div style={{ marginTop: 14, fontSize: 11, color: "rgba(231,236,242,0.35)", fontFamily: "Geist Mono, monospace", lineHeight: 1.5 }}>
                Accent persists. Click any artboard label to focus it fullscreen.
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
