<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1380" />
<title>HookWise · Approach F — Cursor-inspired</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;450;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hookwise-f.css" />
<style>html,body{margin:0;padding:0;background:#0a0a0a;}</style>
</head>
<body style="background-color: rgb(168, 116, 116); font-family: Times">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hookwise-f.jsx"></script>
  <script type="text/babel" src="hookwise-f-pages.jsx"></script>
  <script type="text/babel" src="hookwise-f-docs.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "view": "docs",
      "accent": "#a3e635",
      "showLogoWall": true,
      "showCompare": true,
      "showPricing": true,
      "headline": "The observability layer\nfor webhooks."
    }/*EDITMODE-END*/;

    // Curated palette — Signal green is the new recommendation;
    // Ember kept for continuity, plus Cobalt and Cream as alternates.
    const ACCENT_OPTIONS = [
      "#a3e635", // signal — electric chartreuse · RECOMMENDED
      "#ff6b2c", // ember — original cursor orange
      "#5b6dff", // cobalt — infra blue
      "#fbbf24", // amber — warm warning
      "#f4f2ee", // cream — minimal mono
    ];

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.style.setProperty("--hf-accent", t.accent);
      }, [t.accent]);

      const Landing = window.Landing;
      const Dashboard = window.Dashboard;
      const Docs = window.Docs;

      return (
        <>
          {t.view === "landing"
            ? <Landing
                onView={(v) => setTweak("view", v)}
                showLogoWall={t.showLogoWall}
                showCompare={t.showCompare}
                showPricing={t.showPricing}
                headline={t.headline}
              />
            : t.view === "docs"
            ? <Docs onView={(v) => setTweak("view", v)} />
            : (
              <div style={{ minHeight: "100vh" }}>
                <Dashboard />
                <button
                  onClick={() => setTweak("view", "landing")}
                  style={{ position: "fixed", top: 14, right: 14, zIndex: 99, background: "#1a1a1a", border: "1px solid rgba(255,255,255,0.14)", color: "#b8b5af", borderRadius: 999, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "Inter, sans-serif" }}
                >← landing</button>
              </div>
            )}
          <TweaksPanel title="Tweaks · HookWise F">
            <TweakSection title="View">
              <TweakRadio
                label="Surface"
                value={t.view}
                onChange={(v) => setTweak("view", v)}
                options={[{value: "landing", label: "Landing"}, {value: "dash", label: "Dashboard"}, {value: "docs", label: "Docs"}]}
              />
            </TweakSection>
            <TweakSection title="Brand">
              <TweakColor
                label="Accent"
                value={t.accent}
                onChange={(v) => setTweak("accent", v)}
                options={ACCENT_OPTIONS}
              />
            </TweakSection>
            {t.view === "landing" && (
              <>
                <TweakSection title="Hero">
                  <TweakText
                    label="Headline"
                    value={t.headline}
                    onChange={(v) => setTweak("headline", v)}
                    multiline
                  />
                </TweakSection>
                <TweakSection title="Sections">
                  <TweakToggle label="Trust strip" value={t.showLogoWall} onChange={(v) => setTweak("showLogoWall", v)} />
                  <TweakToggle label="Compare table" value={t.showCompare} onChange={(v) => setTweak("showCompare", v)} />
                  <TweakToggle label="Pricing" value={t.showPricing} onChange={(v) => setTweak("showPricing", v)} />
                </TweakSection>
              </>
            )}
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
